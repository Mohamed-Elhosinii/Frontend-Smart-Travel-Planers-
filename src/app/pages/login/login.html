<div class="login-container">
  <!-- Left Side - Image -->
  <div class="image-side">
    <img src="images/login.jpg" alt="Travel background" />
    <div class="image-overlay">
      <div class="quote-card">
        <p>"Travel is the only thing you buy that makes you richer."</p>
        <span>CURATED BY WANDR AI</span>
      </div>
    </div>
  </div>

  <!-- Right Side - Form -->
  <div class="form-side">
    <div class="form-wrapper">
      <div class="brand">
        <span class="brand-icon">🧭</span>
        <span>TripMind</span>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to access Your AI-powered travel companion.</p>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="name@example.com" />
      </div>

      <div class="form-group">
        <label>
          Password
          <a class="forgot" routerLink="/forgot">Forgot password?</a>
        </label>
        <div class="password-wrapper">
          <input type="password" placeholder="••••••••" />
          <span class="eye-icon">👁</span>
        </div>
      </div>

      <button class="btn-primary">Login</button>

      <div class="divider"><span>OR CONTINUE WITH</span></div>

      <button class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" />
        Sign in with Google
      </button>

      <p class="signup-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
    </div>
  </div>
</div>
