<div class="signup-container">
  <!-- Left Side - Image -->
  <div class="image-side">
    <img src="images/17.jpg" alt="Travel background" />
    <div class="image-overlay">
      <div class="quote-card">
        <h3>Artisanal journeys, AI precision.</h3>
        <p>Our AI agents handle flights, hotels, activities and budget — so you just show up.</p>
      </div>
    </div>
  </div>

  <!-- Right Side - Form -->
  <div class="form-side">
    <div class="form-wrapper">
      <p class="brand">TripMind</p>

      <h1>Join TripMind</h1>
      <p class="subtitle">Start Your Journey.</p>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Julianne Smith" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="name@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" placeholder="••••••••" />
          <span class="eye-icon">👁</span>
        </div>
      </div>

      <button class="btn-primary">Create Account</button>

      <div class="divider"><span>OR</span></div>

      <button class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" />
        Sign up with Google
      </button>

      <p class="login-link">Already have an account? <a routerLink="/login">Log in</a></p>
    </div>
  </div>
</div>
