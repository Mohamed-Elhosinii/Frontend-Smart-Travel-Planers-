@if (toastService.current(); as toast) {
  <div
    class="alert alert-toast d-flex align-items-center gap-2 mb-0"
    [class.alert-success]="toast.type === 'success'"
    [class.alert-danger]="toast.type === 'danger'"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
  >
    <i
      class="fa-solid fs-5"
      [class.fa-circle-check]="toast.type === 'success'"
      [class.fa-circle-exclamation]="toast.type === 'danger'"
      aria-hidden="true"
    ></i>
    <span class="flex-grow-1 small fw-semibold">{{ toast.message }}</span>
    <button
      type="button"
      class="btn-close"
      aria-label="Dismiss notification"
      (click)="toastService.clear()"
    ></button>
  </div>
}
