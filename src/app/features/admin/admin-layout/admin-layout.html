<div class="admin-dashboard-container" [class.sidebar-collapsed]="!isSidebarOpen">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <a routerLink="/" class="brand-link">
        <span class="brand-logo">TripMind</span>
        <span class="brand-badge">Admin</span>
      </a>
    </div>

    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a routerLink="overview" routerLinkActive="active" class="nav-link">
            <i class="fa fa-chart-line"></i>
            <span class="link-text">Overview</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="users" routerLinkActive="active" class="nav-link">
            <i class="fa fa-users"></i>
            <span class="link-text">Users</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="plans" routerLinkActive="active" class="nav-link">
            <i class="fa fa-tags"></i>
            <span class="link-text">Plans</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="payments" routerLinkActive="active" class="nav-link">
            <i class="fa fa-credit-card"></i>
            <span class="link-text">Payments</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-sidebar-logout">
        <i class="fa fa-sign-out-alt"></i>
        <span class="link-text">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-content-wrapper">
    <!-- Topbar -->
    <header class="admin-topbar">
      <button class="toggle-sidebar-btn" (click)="toggleSidebar()" aria-label="Toggle Sidebar">
        <i class="fa fa-bars"></i>
      </button>

      <div class="topbar-actions">
        <span class="admin-email">{{ auth.currentEmail() }}</span>
        <a routerLink="/" class="btn btn-sm btn-outline-brand">
          <i class="fa fa-external-link-alt"></i> View Site
        </a>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="admin-main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
