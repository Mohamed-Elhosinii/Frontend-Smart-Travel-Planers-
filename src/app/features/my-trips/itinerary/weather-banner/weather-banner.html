@if (weather) {
  <div
    class="weather-banner d-flex flex-wrap align-items-center justify-content-between gap-3 position-relative overflow-hidden"
    [ngClass]="getWeatherClass(weather.condition)"
  >

    <!-- Left: icon + temperature + condition pill -->
    <div class="d-flex align-items-center gap-3 weather-left">
      <img
        [src]="weather.iconUrl"
        [alt]="weather.condition + ' weather icon'"
        class="weather-icon flex-shrink-0"
        (error)="$any($event.target).style.display='none'"
        width="54" height="54"
      />
      <div>
        <!-- Temperature display -->
        <div class="d-flex align-items-baseline gap-1 weather-temp-row">
          <span class="temp-max">{{ weather.tempMax }}°C</span>
          <span class="temp-sep fw-normal">/</span>
          <span class="temp-min fw-medium">{{ weather.tempMin }}°C</span>
        </div>
        <span class="weather-pill mt-1 d-inline-block fw-semibold">{{ weather.condition }}</span>
      </div>
    </div>

    <!-- Right: AI tip box -->
    <div class="weather-tip-box d-flex align-items-start">
      <i class="fa-solid fa-lightbulb tip-bulb-icon flex-shrink-0"></i>
      <p class="tip-text mb-0 fst-italic">{{ weather.aiTip }}</p>
    </div>
  </div>
} @else if (isGenerating) {
  <div class="weather-banner weather-default d-flex flex-wrap align-items-center justify-content-between gap-3 loading-banner position-relative overflow-hidden w-100 mb-0">
    <div class="d-flex align-items-center gap-3 weather-left w-100">
      <div class="weather-icon skeleton-circle skeleton-pulse rounded-circle flex-shrink-0"></div>
      <div class="flex-grow-1">
        <div class="skeleton-line skeleton-medium skeleton-pulse mb-2"></div>
        <div class="skeleton-line skeleton-short skeleton-pulse"></div>
      </div>
    </div>
    <div class="weather-tip-box w-100 skeleton-pulse mt-2 d-flex align-items-start" style="height: 60px;"></div>
  </div>
} @else {
  <div class="weather-banner weather-default d-flex flex-wrap align-items-center justify-content-center bg-light text-muted position-relative overflow-hidden w-100 mb-0 py-4 rounded-4 h-100">
    <i class="fa-solid fa-cloud fs-3 me-2 text-secondary"></i>
    <span class="fw-bold fs-6">Weather data not available</span>
  </div>
}
