@if (flight) {
  <div class="summary-card flight-card d-flex align-items-start">
    <div class="card-icon-wrap icon-primary d-flex align-items-center justify-content-center flex-shrink-0">
      <i class="fa-solid fa-plane"></i>
    </div>
    <div class="card-body-wrap">
      <div class="card-label fw-bold text-uppercase">Flight</div>
      <div class="card-main fw-bold text-nowrap overflow-hidden">{{ flight.airline }}</div>
      <div class="card-sub fw-semibold">
        {{ flight.flightNumber }}
        <span class="mx-1 text-muted">|</span>
        {{ flight.departureTime }} → {{ flight.arrivalTime }}
      </div>
      <div class="card-route">
        <i class="fa-solid fa-arrow-right-arrow-left me-1" style="font-size:.6rem;"></i>
        {{ flight.departure }} → {{ flight.arrival }}
      </div>
    </div>
  </div>
} @else {
  <div class="summary-card flight-card loading-card d-flex align-items-start">
    <div class="card-icon-wrap icon-primary skeleton-pulse d-flex align-items-center justify-content-center flex-shrink-0"></div>
    <div class="card-body-wrap w-100">
      <div class="skeleton-line skeleton-short skeleton-pulse mb-2"></div>
      <div class="skeleton-line skeleton-medium skeleton-pulse mb-2"></div>
      <div class="skeleton-line skeleton-long skeleton-pulse"></div>
    </div>
  </div>
}
