<div>
  <h4 class="fw-bold text-deep mb-2">Personal Information</h4>
  <p class="text-muted small mb-4">Manage your basic account details and personal information.</p>
  
  <form (ngSubmit)="onSubmit()">
    <!-- Fields -->
    <div class="row g-3">
      <div class="col-md-6">
        <label for="firstName" class="form-label small fw-bold text-uppercase text-deep">First Name</label>
        <input
          type="text"
          id="firstName"
          name="firstName"
          [(ngModel)]="userProfile.firstName"
          class="form-control px-3 py-2 rounded-3 border bg-white"
          [class.is-invalid]="submitted && firstNameInvalid"
          placeholder="First Name"
          maxlength="50"
          autocomplete="given-name"
          [attr.aria-invalid]="submitted && firstNameInvalid"
          required
        >
        @if (submitted && firstNameInvalid) {
          <div class="invalid-feedback d-block">First name is required.</div>
        }
      </div>
      <div class="col-md-6">
        <label for="lastName" class="form-label small fw-bold text-uppercase text-deep">Last Name</label>
        <input
          type="text"
          id="lastName"
          name="lastName"
          [(ngModel)]="userProfile.lastName"
          class="form-control px-3 py-2 rounded-3 border bg-white"
          [class.is-invalid]="submitted && lastNameInvalid"
          placeholder="Last Name"
          maxlength="50"
          autocomplete="family-name"
          [attr.aria-invalid]="submitted && lastNameInvalid"
          required
        >
        @if (submitted && lastNameInvalid) {
          <div class="invalid-feedback d-block">Last name is required.</div>
        }
      </div>
      <div class="col-12">
        <label for="email" class="form-label small fw-bold text-uppercase text-deep">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [value]="userProfile.email" 
          class="form-control px-3 py-2 rounded-3 border bg-white" 
          disabled
        >
        <div class="form-text text-muted small">Registered email is read-only.</div>
      </div>
    </div>

    <div class="d-flex justify-content-end mt-4">
      <button type="submit" class="btn btn-save rounded-pill px-4 py-2 fw-bold border-0 text-white">
        Save Changes
      </button>
    </div>
  </form>
</div>
