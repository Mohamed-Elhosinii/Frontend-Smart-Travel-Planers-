<div>
  <h4 class="fw-bold text-deep mb-2">Personal Information</h4>
  <p class="text-muted small mb-4">Manage your basic account details and upload your profile picture.</p>
  
  <form (ngSubmit)="onSubmit()">
    <!-- Avatar Upload Placeholder Section -->
    <div class="d-flex align-items-center gap-4 mb-4 pb-4 border-bottom">
      <div class="avatar-upload-container position-relative">
        <img [src]="userProfile.avatarUrl" alt="Avatar Preview" class="rounded-circle object-fit-cover shadow-sm border border-2 border-white" style="width: 100px; height: 100px;">
        <label for="avatarFileInput" class="avatar-overlay position-absolute top-0 start-0 w-100 h-100 rounded-circle d-flex flex-column align-items-center justify-content-center cursor-pointer opacity-0">
          <i class="fa-solid fa-camera text-white fs-4 mb-1"></i>
          <span class="text-white text-uppercase fw-bold" style="font-size: 0.65rem; letter-spacing: 0.5px;">Upload</span>
        </label>
        <input type="file" id="avatarFileInput" class="d-none" accept="image/*" (change)="onAvatarFileChange($event)">
      </div>
      <div>
        <h6 class="fw-bold text-deep mb-1">Avatar Image</h6>
        <p class="text-muted small mb-0">Tap to upload a new profile picture. Supports JPG, PNG.</p>
      </div>
    </div>

    <!-- Fields -->
    <div class="row g-3">
      <div class="col-md-6">
        <label for="firstName" class="form-label small fw-bold text-uppercase text-deep">First Name</label>
        <input 
          type="text" 
          id="firstName" 
          name="firstName" 
          [(ngModel)]="userProfile.firstName" 
          class="form-control px-3 py-2 rounded-3 border bg-white" 
          placeholder="First Name" 
          required
        >
      </div>
      <div class="col-md-6">
        <label for="lastName" class="form-label small fw-bold text-uppercase text-deep">Last Name</label>
        <input 
          type="text" 
          id="lastName" 
          name="lastName" 
          [(ngModel)]="userProfile.lastName" 
          class="form-control px-3 py-2 rounded-3 border bg-white" 
          placeholder="Last Name" 
          required
        >
      </div>
      <div class="col-12">
        <label for="email" class="form-label small fw-bold text-uppercase text-deep">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [value]="userProfile.email" 
          class="form-control px-3 py-2 rounded-3 border bg-white" 
          disabled
        >
        <div class="form-text text-muted small">Registered email is read-only.</div>
      </div>
      <div class="col-md-6">
        <label for="phone" class="form-label small fw-bold text-uppercase text-deep">Phone Number</label>
        <input 
          type="tel" 
          id="phone" 
          name="phone" 
          [(ngModel)]="userProfile.phone" 
          class="form-control px-3 py-2 rounded-3 border bg-white" 
          placeholder="+20 123 456 7890"
        >
      </div>
      <div class="col-md-6">
        <label for="country" class="form-label small fw-bold text-uppercase text-deep">Country</label>
        <select 
          id="country" 
          name="country" 
          [(ngModel)]="userProfile.country" 
          class="form-select px-3 py-2 rounded-3 border bg-white"
        >
          <option value="Egypt">Egypt</option>
          <option value="United States">United States</option>
          <option value="Saudi Arabia">Saudi Arabia</option>
          <option value="United Kingdom">United Kingdom</option>
          <option value="Germany">Germany</option>
          <option value="France">France</option>
        </select>
      </div>
    </div>

    <div class="d-flex justify-content-end mt-4">
      <button type="submit" class="btn btn-save rounded-pill px-4 py-2 fw-bold border-0 text-white">
        Save Changes
      </button>
    </div>
  </form>
</div>
