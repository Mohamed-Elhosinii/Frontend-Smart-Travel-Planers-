<div>
  <h4 class="fw-bold text-deep mb-2">Security &amp; Password</h4>
  <p class="text-muted small mb-4">Keep your account secure. For your protection, password changes are verified by email.</p>

  <div class="security-panel rounded-4 p-4 d-flex flex-column flex-sm-row align-items-sm-center gap-3">
    <div class="security-icon d-flex align-items-center justify-content-center rounded-3 flex-shrink-0">
      <i class="fa-solid fa-shield-halved"></i>
    </div>
    <div class="flex-grow-1">
      <h6 class="fw-bold text-deep mb-1">Change your password</h6>
      <p class="text-muted small mb-0">
        We'll email a reset code to <strong>{{ email || 'your registered email' }}</strong>.
        Enter it on the next screen to set a new password.
      </p>
    </div>
    <button
      type="button"
      class="btn btn-save rounded-pill px-4 py-2 fw-bold border-0 text-white flex-shrink-0"
      [disabled]="sending()"
      (click)="sendResetCode()"
    >
      @if (sending()) {
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      }
      Send reset code
    </button>
  </div>
</div>
